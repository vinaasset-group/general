<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Vinacare - Hệ thống Quản trị Tài sản</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; }
        header { background: #003366; color: white; padding: 20px; text-align: center; }
        nav { display: flex; background: #fff; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        nav button { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; font-weight: bold; color: #555; }
        nav button.active { color: #003366; border-bottom: 3px solid #cda45e; }
        
        .container { display: flex; padding: 20px; gap: 20px; }
        .form-side { flex: 1; background: #fff; padding: 20px; border-radius: 8px; }
        .table-side { flex: 2; background: #fff; padding: 20px; border-radius: 8px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        
        .btn-save { width: 100%; padding: 12px; background: #003366; color: white; border: none; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        .status-tag { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-active { background: #e8f5e9; color: #2e7d32; } /* Đang bảo quản */
        .status-warning { background: #fff3e0; color: #ef6c00; } /* Cần bảo trì */
    </style>
</head>
<body>

    <header>
        <h1 style="margin:0;">VINACARE ASSET JSCo.</h1>
        <small>HỆ THỐNG GIÁM SÁT SOC & NHẬT KÝ SỐ</small>
    </header>

    <div id="main-interface">
        <nav>
            <button class="active">QUẢN LÝ TÀI SẢN KÊ BIÊN</button>
            <button>NHẬT KÝ BẢO TRÌ (QR)</button>
            <button>GIÁM SÁT CAMERA AI</button>
            <button>BÁO CÁO HOA LỢI</button>
        </nav>

        <div class="container">
            <div class="form-side">
                <h3>Tiếp nhận tài sản mới</h3>
                <div class="input-group">
                    <label>Mã vụ án / Quyết định:</label>
                    <input type="text" id="case_id" placeholder="VD: 123/2026/QĐ-CCTHA">
                </div>
                <div class="input-group">
                    <label>Loại tài sản:</label>
                    <select id="asset_type">
                        <option value="BĐS">Bất động sản (Nhà/Biệt thự)</option>
                        <option value="Máy móc">Máy móc / Thiết bị công nghiệp</option>
                        <option value="Nông nghiệp">Ruộng vườn / Cây ăn trái</option>
                        <option value="Phương tiện">Ô tô / Tàu thuyền</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Tình trạng hiện trạng (%):</label>
                    <input type="number" id="asset_condition" placeholder="Định giá ban đầu">
                </div>
                <div class="input-group">
                    <label>Cơ quan chủ quản:</label>
                    <input type="text" id="agency" placeholder="Tòa án / Công an / THADS">
                </div>
                <div class="input-group">
                    <label>Phí quản lý (VNĐ/tháng):</label>
                    <input type="number" id="fee" placeholder="0">
                </div>
                <button class="btn-save" onclick="saveAsset()">CẬP NHẬT HỆ THỐNG</button>
            </div>

            <div class="table-side">
                <h3>Danh sách tài sản đang quản lý</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Mã vụ án</th>
                            <th>Loại tài sản</th>
                            <th>Tình trạng</th>
                            <th>Phí dịch vụ</th>
                            <th>Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody id="asset-list">
                        <!-- Dữ liệu sẽ load từ Firebase tại đây -->
                        <tr>
                            <td>12/2026/Vụ án HS</td>
                            <td>Biệt thự Vinhome</td>
                            <td>95% (Nguyên vẹn)</td>
                            <td>25,000,000</td>
                            <td><span class="status-tag status-active">Đang giám sát</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Các hàm JavaScript xử lý logic lưu trữ và hiển thị sẽ được tích hợp tại đây
        function saveAsset() {
            alert("Đã ghi nhận tài sản vào Nhật ký số. Hệ thống SOC bắt đầu giám sát.");
        }
    </script>
</body>
</html>
